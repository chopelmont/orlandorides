<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chopel Transport Orlando</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-startup-image" href="splash.png">
<meta name="apple-mobile-web-app-title" content="Chopel Transport Orlando">
<meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">

    <style>
.install-btn { 
    background: #1e293b; 
    border: 1px solid var(--blue); 
    color: var(--blue); 
    padding: 10px; 
    border-radius: 12px; 
    font-size: 13px; 
    font-weight: bold; 
    margin-bottom: 15px; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    gap: 8px;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
}
        :root { --blue: #38bdf8; --bg: #0f172a; --card: #1e293b; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .lang-switch { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: #334155; border: 1px solid var(--blue); color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .lang-btn.active { background: var(--blue); color: #0f172a; }
        .status-btn { background: var(--green); border: none; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; min-width: 110px; transition: 0.3s; }
        .status-btn.busy { background: var(--red); }
        .container { background: var(--card); width: 100%; max-width: 420px; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; position: relative; }
        h2 { text-align: center; color: var(--blue); margin: 0 0 20px; font-weight: 800; text-transform: uppercase; }
        .field { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 11px; color: var(--blue); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0b1120; color: white; box-sizing: border-box; font-size: 16px; }
        .suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: #1e293b; border: 1px solid var(--blue); border-radius: 0 0 12px 12px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #334155; line-height: 1.4; color: #cbd5e1; }
        .services { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .srv-card { background: #111; padding: 12px 5px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .srv-card.active { border-color: var(--blue); background: rgba(56, 189, 248, 0.1); }
        .srv-card b { display: block; color: var(--blue); font-size: 13px; margin-top: 4px; }
        .btn-calc { width: 100%; padding: 18px; background: var(--blue); border: none; border-radius: 15px; color: #0f172a; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        #results { margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; display: none; text-align: center; border: 1px solid rgba(56, 189, 248, 0.2); }
        .price { font-size: 42px; color: var(--green); font-weight: 900; margin: 5px 0; }
        .wa-btn { display: flex; align-items: center; justify-content: center; background: #25d366; color: white; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: 800; margin-top: 15px; }
        .wa-btn.busy {background: #f59e0b !important; }
        .footer { text-align: center; font-size: 10px; opacity: 0.3; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('es', this)">ESPAÑOL</button>
    <button class="lang-btn" onclick="setLang('en', this)">ENGLISH</button>
    <button id="st-btn" class="status-btn" onclick="toggleStatus()">Disponible</button>
</div>

<div class="container">
<button class="install-btn" onclick="showInstallInfo()">
    📲 INSTALAR APP EN MI TELÉFONO
</button>
    <h2 id="t-title">Chopel Transport Orlando</h2>
<div class="field">
    <label id="l-pickup">📍 Lugar de Recogida</label>
    <div style="position: relative;">
        <input type="text" id="origin" placeholder="Ej: Orlando Airport" oninput="searchLoc(this, 'origin-list')" onclick="searchLoc(this, 'origin-list')" autocomplete="off">
        
        <span onclick="getCurrentLocation()" style="position: absolute; right: 45px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; z-index: 20;" title="Mi ubicación">🧭</span>
        
        <span onclick="clearField('origin')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--blue); font-size: 22px; font-weight: bold; padding: 5px; z-index: 20;">&times;</span>
    </div>
    <div id="origin-list" class="suggestions"></div>
</div>

<div style="text-align: center; margin: -10px 0;">
    <button type="button" onclick="switchLocations()" style="background: none; border: 1px solid #ccc; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px; color: #007bff; background-color: white;">
        ⇅
    </button>
</div>


    <div class="field">
        <label id="l-dest">🏁 Lugar de Destino</label>
        <input type="text" id="dest" placeholder="Ej: Disney World" oninput="searchLoc(this, 'dest-list')" onclick="searchLoc(this, 'dest-list')" autocomplete="new-password" autocomplete="off" autocorrect="off" spellcheck="false">
              <span onclick="clearField('dest')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--blue); font-size: 22px; font-weight: bold; padding: 5px;">&times;</span>
<div id="dest-list" class="suggestions"></div>
</div>
    <div style="display: flex; gap: 12px;">
        <div class="field" style="flex:1"><label id="l-date">Fecha</label><input type="date" id="date"></div>
        <div class="field" style="flex:1"><label id="l-time">Hora</label><input type="time" id="time"></div>
</div>
    <label id="l-vehicle">🚗 Tipo de Vehículo</label>
    <div class="services">
        <div class="srv-card" onclick="sel(1.5, 'SUV Comfort', this)">SUV Comfort X, 4 Pass-Pers<b>$1.50/mi+0.31*min</b></div>
        <div class="srv-card" onclick="sel(2.0, 'SUV XL     ', this)">SUV Comfort XL, 6 Pass-pers<b>$2.00/mi+0.31*min</b></div>
            </div>
    <button class="btn-calc" id="b-calc" onclick="estimate()">Calcular mi Tarifa</button>
    <div id="results">
        <div id="l-total" style="font-size: 11px; font-weight: bold; opacity: 0.6;">ESTIMADO TOTAL</div>
        <div class="price" id="res-p">$0.00</div>
        <div id="res-d" style="font-size: 14px; color: #cbd5e1;">0 mi | 0 min</div>
        <a href="#" id="wa-link" class="wa-btn" target="_blank">RESERVAR POR WHATSAPP</a>
    </div>
    <div class="footer" onclick="configPhone()">⚙️ CONFIG</div>
</div>

<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js?v=2'); }
    // IMPORTANTE: PEGA TU URL DE FIREBASE AQUÍ (Mantén la barra / al final y el .json)
    const dbURL = "https://orlandoridechopel-default-rtdb.firebaseio.com//status.json";

    let rate = null, srv = "Standard", currentLang = 'es', isOnline = true;
    let myPhone = localStorage.getItem('driverPhone') || "14079672268";
    let fixedDist = 0; 
let timeCharge = 0; // Agrégala donde tienes tus otras variables globales como rate o fixedDist

    const texts = {
        es: { title: "Chopel Transport Orlando", pickup: "📍 Lugar de Recogida", dest: "🏁 Lugar de Destino", date: "Fecha", time: "Hora", vehicle: "🚗 Tipo de Vehículo", calc: "Calcular Tarifa", total: "Estimado Total", book: "RESERVAR POR WHATSAPP", bookBusy: "CONSULTAR DISPONIBILIDAD", alert: "Completa los datos", msg: "NUEVA RESERVA", stOn: "Disponible", stOff: "Ocupado" },
        en: { title: "Chopel Transport orlando", pickup: "📍 Pickup Location", dest: "🏁 Drop-off Location", date: "Date", time: "Time", vehicle: "🚗 Vehicle Type", calc: "Calculate Fare", total: "Estimated Total", book: "BOOK VIA WHATSAPP", bookBusy: "CHECK AVAILABILITY", alert: "Please fill all fields", msg: "NEW BOOKING", stOn: "Available", stOff: "Busy" }
    };
let locCoords = { origin: null, dest: null };



 async function searchLoc(input, listId) {

    const query = input.value;
    const list = document.getElementById(listId);
    
    // 1. Ocultamos el cuadro de tarifas (el de abajo) para que no estorbe
    document.getElementById('results').style.display = 'none';

    // 2. Si el campo está vacío, escondemos la lista de sugerencias y salimos
   fixedDist = 0; 
    if (query.length < 3) { 
        list.style.display = 'none'; 
        return; 
    }

    // 3. ¡IMPORTANTE! Mostramos la lista antes de buscar
      list.style.display = 'block';
    

        document.getElementById('results').style.display = 'none';
const type = listId.split('-')[0]; // Detecta si es 'origin' o 'dest'
    locCoords[type] = null;            // Borra la coordenada vieja

        //const query = input.value;
        //const list = document.getElementById(listId);
       // fixedDist = 0; 
       // if (query.length < 4) { list.style.display = 'none'; return; }

        try {
            // Añadimos un pequeño retraso para no saturar el celular mientras escribes
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}+Florida&limit=5`);
            const data = await response.json();
            list.innerHTML = '';
            if (data.length > 0) {
                list.style.display = 'block';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = item.display_name;
                    div.onclick = () => {
                        input.value = item.display_name;
                        list.style.display = 'none';
                        const type = listId.split('-')[0];
                        locCoords[type] = { lat: parseFloat(item.lat), lon: parseFloat(item.lon) };
                        // Esto ayuda a que el celular reconozca que ya seleccionaste algo
                        input.blur(); 
                    };
                    list.appendChild(div);
                });
            }
        } catch (e) { console.error("Error en búsqueda"); }
    }
    // Función para SINCRONIZAR estado con el servidor
    async function toggleStatus() {
        const newState = !isOnline;
        try {
            await fetch(dbURL, {
                method: 'PUT',
                body: JSON.stringify({ online: newState })
            });
        } catch (e) { console.error("Error sincronizando", e); }
    }

    // Escuchar cambios en tiempo real (Pooling sencillo cada 3 segundos)
    async function checkStatus() {
        try {
            const res = await fetch(dbURL);
            const data = await res.json();
            if(data && data.online !== isOnline) {
                isOnline = data.online;
                updateUIStatus();
            }
        } catch (e) {}
    }
    setInterval(checkStatus, 3000); // Revisa cada 3 segundos si cambiaste el botón

    function updateUIStatus() {
        const btn = document.getElementById('st-btn');
        btn.innerText = isOnline ? texts[currentLang].stOn : texts[currentLang].stOff;
        btn.classList.toggle('busy', !isOnline);
        if(fixedDist > 0) updateDisplay();
    }

    function setLang(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('t-title').innerText = texts[lang].title;
        document.getElementById('l-pickup').innerText = texts[lang].pickup;
        document.getElementById('l-dest').innerText = texts[lang].dest;
        document.getElementById('l-date').innerText = texts[lang].date;
        document.getElementById('l-time').innerText = texts[lang].time;
        document.getElementById('l-vehicle').innerText = texts[lang].vehicle;
        document.getElementById('b-calc').innerText = texts[lang].calc;
        document.getElementById('l-total').innerText = texts[lang].total;
        document.getElementById('st-btn').innerText = isOnline ? texts[lang].stOn : texts[lang].stOff;

if (rate !== null && fixedDist > 0) {
        updateDisplay();
    }
 }


    function sel(r, n, e) {
        document.querySelectorAll('.srv-card').forEach(c => c.classList.remove('active'));
        e.classList.add('active');
        rate = r; srv = n;
        if(fixedDist > 0) updateDisplay(); 
    }

    function estimate() {
        if (!document.getElementById('origin').value || !document.getElementById('dest').value || !document.getElementById('date').value || !document.getElementById('time').value) {
            alert(texts[currentLang].alert); return;
        }
if (rate === null) {
        alert("Por favor, selecciona un tipo de vehículo para continuar.");
        return;
}
        if(locCoords.origin && locCoords.dest) {
            const R = 3958.8;
            const dLat = (locCoords.dest.lat - locCoords.origin.lat) * Math.PI / 180;
            const dLon = (locCoords.dest.lon - locCoords.origin.lon) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(locCoords.origin.lat * Math.PI / 180) * Math.cos(locCoords.dest.lat * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            fixedDist = Math.round((R * c) * 1.45);
            if(fixedDist < 2) fixedDist = 5; 
        } else { fixedDist = 16; }
let estimatedMin = Math.round(fixedDist * 2.2); 
timeCharge = estimatedMin * 0.31; // Guarda el costo del tiempo
        updateDisplay();
    }

    function updateDisplay() {
   //     let total = (fixedDist * rate).toFixed(2);
let total = ( (fixedDist * rate) + (timeCharge || 0) ).toFixed(2);
        if(parseFloat(total) < 20) total = "20.00"; 
        document.getElementById('res-p').innerText = `$${total}`;
        document.getElementById('res-d').innerText = `${fixedDist} mi | ~${Math.round(fixedDist * 2.2)} min`;
        document.getElementById('results').style.display = 'block';
        const waBtn = document.getElementById('wa-link');
        waBtn.innerText = isOnline ? texts[currentLang].book : texts[currentLang].bookBusy;


let msg = "";

    if (currentLang === 'es') {
        // MENSAJE EN ESPAÑOL
        msg = `*${isOnline ? 'NUEVA RESERVA' : 'CONSULTA DE DISPONIBILIDAD'}*\n`;
        msg += `📍 De: ${document.getElementById('origin').value}\n`;
        msg += `🏁 A: ${document.getElementById('dest').value}\n`;
        msg += `📅 Fecha: ${document.getElementById('date').value}\n`;
        msg += `⌚ Hora: ${document.getElementById('time').value}\n`;
        msg += `🚗 Auto: ${srv}\n`;
        msg += `💰 Total: $${total}\n\n`;

        if (isOnline) {
            msg += "Gracias por contactarnos, ¿Me da unos mins y le confirmo?\n";
            msg += "Por favor tenga en cuenta que las tarifas son un estimado que puede variar (disminuir o aumentar) por trafico y tiempo para llegar al destino\n";
            msg += "Link para acceso rapido... https://chopelmont.github.io/orlandorides/\n";

        } else {
            msg += "Estoy en servicio. pero puede hacer su futura reserva y le confirmaremos tan pronto sea posible, aqui le dejamos el link para acceso rapido... https://chopelmont.github.io/orlandorides/\n";
        }
    } else {
        // MENSAJE EN INGLÉS
        msg = `*${isOnline ? 'NEW BOOKING' : 'AVAILABILITY INQUIRY'}*\n`;
        msg += `📍 From: ${document.getElementById('origin').value}\n`;
        msg += `🏁 To: ${document.getElementById('dest').value}\n`;
        msg += `📅 Date: ${document.getElementById('date').value}\n`;
        msg += `⌚ Time: ${document.getElementById('time').value}\n`;
        msg += `🚗 Car: ${srv}\n`;
        msg += `💰 Total: $${total}\n\n`;

        if (isOnline) {
            msg += "Thank you for contacting us, Can you give me a few mins to confirm?\n";
            msg += "Please note that fares are an estimate that may vary (decrease or increase) due to traffic and travel time to the destination\n";
            msg += "Link for quick access... https://chopelmont.github.io/orlandorides/\n";

        } else {
            msg += "I am currently on a fare, but you can make your future reservation and we will confirm Asap. Here is our link for quick access... https://chopelmont.github.io/orlandorides/\n";
        }
     }

// --- LÍNEA PARA CAMBIAR EL COLOR SEGÚN STATUS ---
    if (!isOnline) {
        waBtn.classList.add('busy'); // Se pone naranja
    } else {
        waBtn.classList.remove('busy'); // Vuelve a verde
    }

 waBtn.href = `https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`;

    }


    function configPhone() {
        const p = prompt("WhatsApp (ej: 14071234567):", myPhone);
        if(p) { localStorage.setItem('driverPhone', p); myPhone = p; }
    }

function showInstallInfo() {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
        alert("PARA INSTALAR EN IPHONE:\n\n1. Toca el botón 'Compartir' (el cuadro con una flecha arriba 📤) en la parte inferior.\n2. Busca y toca en 'Agregar a inicio' (Add to Home Screen ➕).\n3. ¡Listo! Ya nos tendrás en tu pantalla.");
    } else {
        alert("PARA INSTALAR EN ANDROID:\n\n1. Toca los 3 puntos (⋮) en la esquina superior derecha.\n2. Toca en 'Instalar aplicación' o 'Agregar a la pantalla de inicio'.\n3. ¡Listo! Acceso directo creado.");
    }
}
function clearField(id) {
    document.getElementById(id).value = ""; // Borra el texto
    document.getElementById(id + '-list').style.display = 'none'; // Cierra sugerencias
    document.getElementById('results').style.display = 'none'; // Oculta el precio
    
    // Resetea el vehículo para que no se quede encendido
    rate = null;
    document.querySelectorAll('.srv-card').forEach(c => c.classList.remove('active'));
    
    document.getElementById(id).focus(); // Deja el cursor listo para escribir
}
function switchLocations() {
    // 1. Intercambiar los textos de los inputs
    const originInput = document.getElementById('origin');
    const destInput = document.getElementById('dest');
    const tempText = originInput.value;
    
    originInput.value = destInput.value;
    destInput.value = tempText;

    // 2. Intercambiar las coordenadas guardadas (importante para el cálculo)
    if (locCoords.origin && locCoords.dest) {
        const tempCoords = locCoords.origin;
        locCoords.origin = locCoords.dest;
        locCoords.dest = tempCoords;
        
        // 3. Recalcular automáticamente el estimado con el nuevo orden
        estimate();
    }
}
async function getCurrentLocation() {
    if (!navigator.geolocation) {
        alert("Tu navegador no soporta geolocalización");
        return;
    }

    // Cambiamos el icono temporalmente para mostrar que está cargando
    const originInput = document.getElementById('origin');
    originInput.placeholder = "Obteniendo ubicación...";

    navigator.geolocation.getCurrentPosition(async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        try {
            // Buscamos la dirección real usando las coordenadas (Reverse Geocoding)
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            
            if (data.display_name) {
                originInput.value = data.display_name;
                // Guardamos las coordenadas para que el cálculo de tarifa funcione
                locCoords.origin = { lat: lat, lon: lon };
                
                // Si ya hay un destino, recalculamos la tarifa automáticamente
                if(locCoords.dest) estimate();
            }
        } catch (e) {
            alert("Error al obtener la dirección");
        } finally {
            originInput.placeholder = "Ej: Orlando Airport";
        }
    }, (error) => {
        alert("Por favor activa el GPS de tu celular");
        originInput.placeholder = "Ej: Orlando Airport";
    });
}
</script>
</body>
</html>
