<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chopel Transport Orlando</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-startup-image" href="splash.png">
    <meta name="apple-mobile-web-app-title" content="Chopel Transport Orlando">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <style>
        .install-btn { 
            background: #1e293b; 
            border: 1px solid var(--blue); 
            color: var(--blue); 
            padding: 10px; 
            border-radius: 12px; 
            font-size: 13px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            animation: pulse 2s infinite;
            width: 100%;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        :root { --blue: #38bdf8; --bg: #0f172a; --card: #1e293b; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .lang-switch { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        .lang-btn { background: #334155; border: 1px solid var(--blue); color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .lang-btn.active { background: var(--blue); color: #0f172a; }
        .status-btn { background: var(--green); border: none; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; min-width: 110px; transition: 0.3s; }
        .status-btn.busy { background: var(--red); }
        .container { background: var(--card); width: 100%; max-width: 420px; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; position: relative; }
        h2 { text-align: center; color: var(--blue); margin: 0 0 20px; font-weight: 800; text-transform: uppercase; }
        .field { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 11px; color: var(--blue); margin-bottom: 6px; font-weight: 800; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0b1120; color: white; box-sizing: border-box; font-size: 16px; }
        .suggestions { position: absolute; top: 100%; left: 0; width: 100%; background: #1e293b; border: 1px solid var(--blue); border-radius: 0 0 12px 12px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #334155; line-height: 1.4; color: #cbd5e1; }
        .services { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .srv-card { background: #111; padding: 12px 5px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .srv-card.active { border-color: var(--blue); background: rgba(56, 189, 248, 0.1); }
        .srv-card b { display: block; color: var(--blue); font-size: 13px; margin-top: 4px; }
        .btn-calc { width: 100%; padding: 18px; background: var(--blue); border: none; border-radius: 15px; color: #0f172a; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        #results { margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; display: none; text-align: center; border: 1px solid rgba(56, 189, 248, 0.2); }
        .price { font-size: 42px; color: var(--green); font-weight: 900; margin: 5px 0; }
        .wa-btn { display: flex; align-items: center; justify-content: center; background: #25d366; color: white; text-decoration: none; padding: 16px; border-radius: 15px; font-weight: 800; margin-top: 15px; }
        .wa-btn.busy {background: #f59e0b !important; }
        .footer { text-align: center; font-size: 10px; opacity: 0.3; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="lang-switch">
    <button class="lang-btn active" onclick="setLang('es', this)">ESPAÑOL</button>
    <button class="lang-btn" onclick="setLang('en', this)">ENGLISH</button>
    <button id="st-btn" class="status-btn" onclick="toggleStatus()">Disponible</button>
</div>

<div class="container">
    <button id="main-install-btn" class="install-btn" onclick="showInstallInfo()">
        📲 INSTALAR APP EN MI TELÉFONO
    </button>
    
    <h2 id="t-title">Chopel Transport Orlando</h2>
    
    <div class="field">
        <label id="l-pickup">📍 Lugar de Recogida</label>
        <div style="position: relative;">
            <input type="text" id="origin" placeholder="Ej: Orlando Airport" oninput="searchLoc(this, 'origin-list')" onclick="searchLoc(this, 'origin-list')" autocomplete="off">
            <span onclick="getCurrentLocation()" style="position: absolute; right: 45px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px; z-index: 20;" title="Mi ubicación">🎯</span>
            <span onclick="clearField('origin')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--blue); font-size: 22px; font-weight: bold; padding: 5px; z-index: 20;">&times;</span>
        </div>
        <div id="origin-list" class="suggestions"></div>
    </div>

    <div style="text-align: center; margin: -10px 0;">
        <button type="button" onclick="switchLocations()" style="background: none; border: 1px solid #ccc; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px; color: #007bff; background-color: white;">⇅</button>
    </div>

    <div class="field">
        <label id="l-dest">🏁 Lugar de Destino</label>
        <div style="position: relative;">
            <input type="text" id="dest" placeholder="Ej: Disney World" oninput="searchLoc(this, 'dest-list')" onclick="searchLoc(this, 'dest-list')" autocomplete="off">
            <span onclick="clearField('dest')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--blue); font-size: 22px; font-weight: bold; padding: 5px;">&times;</span>
        </div>
        <div id="dest-list" class="suggestions"></div>
    </div>

    <div style="display: flex; gap: 12px;">
        <div class="field" style="flex:1"><label id="l-date">Fecha</label><input type="date" id="date"></div>
        <div class="field" style="flex:1"><label id="l-time">Hora</label><input type="time" id="time"></div>
    </div>

    <label id="l-vehicle">🚗 Tipo de Vehículo</label>
    <div class="services">
        <div class="srv-card" onclick="sel(1.5, 'SUV Comfort', this)">SUV Comfort X, 4 Pass-Pers<b>$1.50/mi+0.31*min</b></div>
        <div class="srv-card" onclick="sel(2.0, 'SUV XL', this)">SUV Comfort XL, 6 Pass-pers<b>$2.00/mi+0.31*min</b></div>
    </div>

    <button class="btn-calc" id="b-calc" onclick="estimate()">Calcular mi Tarifa</button>

    <div id="results">
        <div id="l-total" style="font-size: 11px; font-weight: bold; opacity: 0.6;">ESTIMADO TOTAL</div>
        <div class="price" id="res-p">$0.00</div>
        <div id="res-d" style="font-size: 14px; color: #cbd5e1;">0 mi | 0 min</div>
        <a href="#" id="wa-link" class="wa-btn" target="_blank">RESERVAR POR WHATSAPP</a>
    </div>

   </div>

<script>
// --- LOGICA DE SERVICE WORKER E INSTALACIÓN ---
if ('serviceWorker' in navigator) { 
    navigator.serviceWorker.register('./sw.js?v=2') // Agregamos el ./ para asegurar la ruta
    .then(() => console.log("Service Worker registrado con éxito"))
    .catch(err => console.log("Error al registrar SW:", err));
}

let deferredPrompt; 
window.addEventListener('beforeinstallprompt', (e) => {
    // Evita que Chrome lo muestre solo apenas carga
    e.preventDefault();
    // Guarda el evento para que tu botón lo use después
    deferredPrompt = e;
    console.log("Evento de instalación capturado y listo.");
});

// --- VARIABLES Y CONFIGURACIÓN ---
const dbURL = "https://orlandoridechopel-default-rtdb.firebaseio.com//status.json";
let rate = null, srv = "Standard", currentLang = 'es', isOnline = true;
let myPhone = localStorage.getItem('driverPhone') || "14079672268";
let fixedDist = 0; 
let timeCharge = 0;
let locCoords = { origin: null, dest: null };

const texts = {
    es: { 
        title: "Chopel Transport Orlando", pickup: "📍 Lugar de Recogida", dest: "🏁 Lugar de Destino", date: "Fecha", time: "Hora", vehicle: "🚗 Tipo de Vehículo", calc: "Calcular Tarifa", total: "Estimado Total", book: "RESERVAR POR WHATSAPP", bookBusy: "CONSULTAR DISPONIBILIDAD", alert: "Completa los datos", msg: "NUEVA RESERVA", stOn: "Disponible", stOff: "Ocupado",
        installBtn: "📲 INSTALAR APP EN MI TELÉFONO",
        instIOS: "PARA INSTALAR EN IPHONE:\n\n1. Toca el botón 'Compartir' (cuadro con flecha arriba 📤).\n2. Selecciona 'Agregar a inicio' (Add to Home Screen ➕).",
        instAndroid: "PARA INSTALAR EN ANDROID:\n\n1. Toca los 3 puntos (⋮) arriba a la derecha.\n2. Toca en 'Instalar aplicación'."
    },
    en: { 
        title: "Chopel Transport Orlando", pickup: "📍 Pickup Location", dest: "🏁 Drop-off Location", date: "Date", time: "Time", vehicle: "🚗 Vehicle Type", calc: "Calculate Fare", total: "Estimated Total", book: "BOOK VIA WHATSAPP", bookBusy: "CHECK AVAILABILITY", alert: "Please fill all fields", msg: "NEW BOOKING", stOn: "Available", stOff: "Busy",
        installBtn: "📲 INSTALL APP ON MY PHONE",
        instIOS: "TO INSTALL ON IPHONE:\n\n1. Tap the 'Share' button (square with arrow 📤).\n2. Select 'Add to Home Screen' (➕).\n3. Done!",
        instAndroid: "TO INSTALL ON ANDROID:\n\n1. Tap the 3 dots (⋮) top right.\n2. Tap 'Install app' or 'Add to home screen'."
    }
};

// --- FUNCIONES CORE ---

async function toggleStatus() {
    const newState = !isOnline;
    try {
        await fetch(dbURL, {
            method: 'PUT',
            body: JSON.stringify({ online: newState })
        });
    } catch (e) { console.error("Error sincronizando", e); }
}

async function checkStatus() {
    try {
        const res = await fetch(dbURL);
        const data = await res.json();
        if(data && data.online !== isOnline) {
            isOnline = data.online;
            updateUIStatus();
        }
    } catch (e) {}
}
setInterval(checkStatus, 3000);

function updateUIStatus() {
    const btn = document.getElementById('st-btn');
    btn.innerText = isOnline ? texts[currentLang].stOn : texts[currentLang].stOff;
    btn.classList.toggle('busy', !isOnline);
    if(fixedDist > 0) updateDisplay();
}

function setLang(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('t-title').innerText = texts[lang].title;
    document.getElementById('l-pickup').innerText = texts[lang].pickup;
    document.getElementById('l-dest').innerText = texts[lang].dest;
    document.getElementById('l-date').innerText = texts[lang].date;
    document.getElementById('l-time').innerText = texts[lang].time;
    document.getElementById('l-vehicle').innerText = texts[lang].vehicle;
    document.getElementById('b-calc').innerText = texts[lang].calc;
    document.getElementById('l-total').innerText = texts[lang].total;
    document.getElementById('st-btn').innerText = isOnline ? texts[lang].stOn : texts[lang].stOff;
    
    // Traducción del botón de instalación
    document.getElementById('main-install-btn').innerText = texts[lang].installBtn;

    if (rate !== null && fixedDist > 0) updateDisplay();
}

function showInstallInfo() {
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    // Si deferredPrompt existe, es Android y Chrome está listo para instalar
    if (deferredPrompt) {
        deferredPrompt.prompt(); // Lanza el cartel oficial de Android
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('El usuario instaló la App');
            } else {
                console.log('El usuario canceló');
            }
            deferredPrompt = null; // Se limpia para que no se duplique
        });
    } else {
        // Si no hay deferredPrompt, mostramos las instrucciones manuales (iPhone o Android ya instalado)
        alert(isIOS ? texts[currentLang].instIOS : texts[currentLang].instAndroid);
    }
    }

async function searchLoc(input, listId) {

fixedDist = 0; // Resetea la distancia
    document.getElementById('results').style.display = 'none'; // Oculta el precio viejo

    const query = input.value;
    const list = document.getElementById(listId);
    document.getElementById('results').style.display = 'none';
    const type = listId.split('-')[0];
    locCoords[type] = null;
    
    if (query.length < 3) { list.style.display = 'none'; return; }
    list.style.display = 'block';

    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}+Florida&limit=5`);
        const data = await response.json();
        list.innerHTML = '';
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerText = item.display_name;
            div.onclick = () => {
                input.value = item.display_name;
                list.style.display = 'none';
                locCoords[type] = { lat: parseFloat(item.lat), lon: parseFloat(item.lon) };
                input.blur(); 
            };
            list.appendChild(div);
        });
    } catch (e) { console.error("Error en búsqueda"); }
}

function sel(r, n, e) {

 const origin = document.getElementById('origin').value.trim();
    const dest = document.getElementById('dest').value.trim();
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;

// Si falta CUALQUIER dato, no deja seleccionar y oculta resultados viejos
    if (!origin || !dest || !date || !time) {
        document.getElementById('results').style.display = 'none';
        alert(texts[currentLang].alert);
        return;
    }

if (!document.getElementById('origin').value.trim() || !document.getElementById('dest').value.trim()) {
        alert(texts[currentLang].alert);
        return;
    }

    document.querySelectorAll('.srv-card').forEach(c => c.classList.remove('active'));
    e.classList.add('active');
    rate = r; srv = n;
    if(fixedDist > 0) updateDisplay(); 
}

function estimate() {
    if (!document.getElementById('origin').value || !document.getElementById('dest').value || !document.getElementById('date').value || !document.getElementById('time').value) {
        alert(texts[currentLang].alert); return;
    }
    if (rate === null) {
       alert("Please select a vehicle type : Por favor selecciona un tipo vehículo"); return;
 }
    
    if(locCoords.origin && locCoords.dest) {
        const R = 3958.8;
        const dLat = (locCoords.dest.lat - locCoords.origin.lat) * Math.PI / 180;
        const dLon = (locCoords.dest.lon - locCoords.origin.lon) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(locCoords.origin.lat * Math.PI / 180) * Math.cos(locCoords.dest.lat * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        fixedDist = Math.round((R * c) * 1.45);
        if(fixedDist < 2) fixedDist = 5; 
    } else { fixedDist = 16; }
    
    timeCharge = Math.round(fixedDist * 2.2) * 0.31;
    updateDisplay();
}

function updateDisplay() {
    let total = ( (fixedDist * rate) + (timeCharge || 0) ).toFixed(2);
 if (srv === 'SUV Comfort' && parseFloat(total) < 15) {
    total = "15.00";
} else if (srv === 'SUV XL' && parseFloat(total) < 20) {
    total = "20.00";
}
 
    document.getElementById('res-p').innerText = `$${total}`;
    document.getElementById('res-d').innerText = `${fixedDist} mi | ~${Math.round(fixedDist * 2.2)} min`;
    document.getElementById('results').style.display = 'block';
    
    const waBtn = document.getElementById('wa-link');
    waBtn.innerText = isOnline ? texts[currentLang].book : texts[currentLang].bookBusy;
    waBtn.classList.toggle('busy', !isOnline);

    let msg = `*${isOnline ? texts[currentLang].msg : (currentLang === 'es' ? 'CONSULTA' : 'INQUIRY')}*\n`;
        msg += `📍 De: ${document.getElementById('origin').value}\n🏁 A: ${document.getElementById('dest').value}\n📅: ${document.getElementById('date').value}\n⌚: ${document.getElementById('time').value}\n🚗: ${srv}\n💰: $${total}\n`;
     msg += currentLang === 'es' ? (isOnline ? "Confírmeme disponibilidad por favor." : "Dejo mi reserva pendiente.") : (isOnline ? "Please confirm availability." : "Leaving my booking for review.");
 
 if (currentLang === 'es') {
        // MENSAJE EN ESPAÑOL

         if (isOnline) {
            msg += "\n\nGracias por contactarnos, ¿Me da unos mins y le confirmo?\n";
            msg += "Por favor tenga en cuenta que las tarifas son un estimado que puede variar (disminuir o aumentar) por trafico y tiempo para llegar al destino\n\n";
            msg += "Link para acceso rapido... https://chopelmont.github.io/orlandorides/\n";

        } else {
            msg += "\nEstoy en servicio. pero puede hacer su futura reserva y le confirmaremos tan pronto sea posible, aqui le dejamos el link para acceso rapido... https://chopelmont.github.io/orlandorides/\n";
        }
    } else {
        // MENSAJE EN INGLÉS
      
        if (isOnline) {
            msg += "\n\nThank you for contacting us, Can you give me a few mins to confirm?\n";
            msg += "Please note that fares are an estimate that may vary (decrease or increase) due to traffic and travel time to the destination\n\n";
            msg += "Link for quick access... https://chopelmont.github.io/orlandorides/\n";

        } else {
            msg += "\nI am currently on a fare, but you can make your future reservation and we will confirm Asap. Here is our link for quick access... https://chopelmont.github.io/orlandorides/\n";
        }
     }

    
    waBtn.href = `https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`;
}

function configPhone() {
    const p = prompt("WhatsApp (ej: 14079672268):", myPhone);
    if(p) { localStorage.setItem('driverPhone', p); myPhone = p; }
}

function clearField(id) {
    document.getElementById(id).value = "";
    document.getElementById(id + '-list').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    rate = null;
    document.querySelectorAll('.srv-card').forEach(c => c.classList.remove('active'));
}

function switchLocations() {
    const originInput = document.getElementById('origin'), destInput = document.getElementById('dest');
    const tempText = originInput.value, tempCoords = locCoords.origin;
    originInput.value = destInput.value; locCoords.origin = locCoords.dest;
    destInput.value = tempText; locCoords.dest = tempCoords;
    if(locCoords.origin && locCoords.dest) estimate();
}

async function getCurrentLocation() {
    if (!navigator.geolocation) return;
    const originInput = document.getElementById('origin');
    
    // Feedback inmediato al usuario
    originInput.value = "📍 Obteniendo ubicación..."; 
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude: lat, longitude: lon } = pos.coords;
        locCoords.origin = { lat, lon };

        try {
            // Usamos un fetch con prioridad alta
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, {
                headers: { 'Accept-Language': 'es' }
            });
            const data = await res.json();
            
            if (data.display_name) {
                // Cortamos la dirección para que no sea excesivamente larga
                const shortAddr = data.display_name.split(',').slice(0, 3).join(',');
                originInput.value = shortAddr;
                
                // Si ya hay destino, calculamos de una vez
                if(locCoords.dest) estimate();
            }
        } catch (e) {
            originInput.value = "Ubicación obtenida (GPS)";
        }
    }, (error) => {
        console.error(error);
        originInput.placeholder = "Error de GPS";
    }, {
        enableHighAccuracy: true, 
        timeout: 10000,           // Le damos un poco más de tiempo (10 seg)
        maximumAge: 30000        // <--- CAMBIO CLAVE: Permite usar una ubicación de hace 30 segundos
    });       
}
</script>
</body>
</html>
